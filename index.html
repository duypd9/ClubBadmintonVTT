<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel VTT Badminton - Live Score</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Hiệu ứng Header */
        .header-gradient {
            background: linear-gradient(135deg, #ee0000 0%, #c20000 50%, #990000 100%);
        }
        .header-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .glass-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="text-slate-900 pb-12">

    <!-- HEADER -->
    <header class="header-gradient text-white relative overflow-hidden shadow-2xl">
        <div class="absolute inset-0 header-pattern opacity-40"></div>
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-72 h-72 bg-black/10 rounded-full blur-2xl"></div>
        
        <div class="max-w-4xl mx-auto px-6 py-8 md:py-12 relative z-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div class="space-y-2">
                    <div class="flex items-center gap-3">
                        <div class="glass-badge p-2 rounded-xl">
                            <svg class="w-8 h-8 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M18 2H6c-1.1 0-2 .9-2 2v2c0 2.21 1.79 4 4 4h1v2c0 2.12 1.34 4.07 3.23 4.69l-.73 1.81c-.26.65.22 1.34.92 1.34h3.16c.7 0 1.18-.69.92-1.34l-.73-1.81C17.66 16.07 19 14.12 19 12v-2h1c2.21 0 4-1.79 4-4V4c0-1.1-.9-2-2-2zm-12 4V4h2v4H7c-.55 0-1-.45-1-1zm12 1c0 .55-.45 1-1 1h-1V4h2v2z"/>
                            </svg>
                        </div>
                        <h1 class="text-2xl md:text-4xl font-black italic tracking-tighter uppercase leading-none">
                            Viettel VTT<br/>
                            <span class="text-white/90 font-extrabold not-italic text-lg md:text-2xl tracking-normal">Badminton Tournament</span>
                        </h1>
                    </div>
                </div>
                
                <div class="flex flex-col items-start md:items-end">
                    <div class="glass-badge px-4 py-2 rounded-2xl">
                        <p class="text-[11px] font-black uppercase tracking-[0.2em] text-white/80">Cúp Đồng Đội Tiếp Sức "Mini"</p>
                        <p class="text-sm font-bold text-yellow-300">Live Scoring System</p>
                    </div>
                </div>
            </div>
            <div class="mt-8 h-1 w-full bg-gradient-to-r from-transparent via-white/20 to-transparent rounded-full"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-8 mt-4">
        <!-- NAVIGATION SLOTS -->
        <div id="nav-slots" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide"></div>

        <!-- CONTENT AREA -->
        <div id="content-area" class="space-y-4"></div>

        <!-- STANDINGS & RESULTS -->
        <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-6 md:p-8">
            <div id="final-podium" class="mb-10 hidden">
                <div class="flex items-center gap-3 mb-6 border-l-4 border-yellow-500 pl-4">
                    <h3 class="font-black text-slate-900 uppercase tracking-tighter text-xl">Kết Quả Chung Cuộc</h3>
                </div>
                <div id="podium-content" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div class="flex items-center gap-3 mb-8 border-l-4 border-red-600 pl-4">
                <h3 class="font-black text-slate-900 uppercase tracking-tighter text-xl">Bảng Xếp Hạng Vòng Bảng</h3>
                <div class="bg-red-50 text-red-600 text-[10px] font-black px-2 py-0.5 rounded italic">LIVE</div>
            </div>
            <div id="standings-tables" class="grid grid-cols-1 lg:grid-cols-2 gap-10"></div>
            <div class="mt-10 flex items-start gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <span class="text-red-600 mt-0.5">⚠️</span>
                <div class="text-[10px] font-bold text-slate-500 leading-relaxed">
                    LƯU Ý: Thứ tự xếp hạng dựa trên Số trận thắng > Hiệu số điểm > Đối đầu. Hệ thống tự động cập nhật ngay khi điểm được nhập.
                </div>
            </div>
        </div>
    </main>

    <script>
        const schedule = [
            { title: "Khởi động & Phổ biến", courts: [], note: "Phổ biến luật Tiếp sức: Cặp 1 đánh đến 21, Cặp 2 nối tiếp đến 42." },
            { title: "Vòng Bảng - Lượt 1", courts: [
                { id: 'r1_m1', name: "Sân 1", group: 'A', teamA: 'A1', teamB: 'A2' },
                { id: 'r1_m2', name: "Sân 2", group: 'B', teamA: 'B1', teamB: 'B2' }
            ]},
            { title: "Vòng Bảng - Lượt 2", courts: [
                { id: 'r2_m1', name: "Sân 1", group: 'A', teamA: 'A1', teamB: 'A3' },
                { id: 'r2_m2', name: "Sân 2", group: 'B', teamA: 'B1', teamB: 'B3' }
            ]},
            { title: "Vòng Bảng - Lượt 3", courts: [
                { id: 'r3_m1', name: "Sân 1", group: 'A', teamA: 'A2', teamB: 'A3' },
                { id: 'r3_m2', name: "Sân 2", group: 'B', teamA: 'B2', teamB: 'B3' }
            ]},
            { title: "Vòng Bán Kết", note: "Đấu chéo: Nhất bảng này gặp Nhì bảng kia. Đội thắng vào Chung kết.", courts: [
                { id: 'sf1', name: "Sân 1", type: "semi", teamA: 'Nhất A', teamB: 'Nhì B' },
                { id: 'sf2', name: "Sân 2", type: "semi", teamA: 'Nhì A', teamB: 'Nhất B' }
            ]},
            { title: "Chung Kết", note: "Xác định các thứ hạng chung cuộc.", courts: [
                { id: 'f1', name: "Sân 1", type: "final", teamA: 'Thắng BK1', teamB: 'Thắng BK2' },
                { id: 'f2', name: "Sân 2", type: "rank", teamA: 'Thua BK1', teamB: 'Thua BK2' }
            ]}
        ];

        let currentSlotIndex = 0;
        let scores = {};

        function init() {
            renderNav();
            renderContent();
            renderStandings();
        }

        function renderNav() {
            const nav = document.getElementById('nav-slots');
            nav.innerHTML = schedule.map((slot, idx) => `
                <button onclick="changeSlot(${idx})" class="flex-shrink-0 px-6 py-4 rounded-2xl border-2 transition-all font-bold text-sm min-w-[160px] ${currentSlotIndex === idx ? 'bg-red-600 border-red-600 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400 hover:border-red-100'}">
                    <div class="truncate uppercase tracking-tight">${slot.title}</div>
                </button>
            `).join('');
        }

        function changeSlot(idx) {
            currentSlotIndex = idx;
            renderNav();
            renderContent();
        }

        function updateScore(matchId, field, value) {
            if (value !== '' && !/^\d+$/.test(value)) return;
            if (value.length > 2) value = value.slice(-2);

            if (!scores[matchId]) scores[matchId] = { a_p1: '', b_p1: '', a_p2: '', b_p2: '' };
            scores[matchId][field] = value;
            
            renderStandings();
            
            const isFinished = parseInt(scores[matchId].a_p2) >= 42 || parseInt(scores[matchId].b_p2) >= 42;
            const finishBadge = document.getElementById(`finish-${matchId}`);
            if (finishBadge) {
                finishBadge.style.display = isFinished ? 'flex' : 'none';
            }
        }

        function renderContent() {
            const content = document.getElementById('content-area');
            const slot = schedule[currentSlotIndex];

            if (slot.courts.length === 0) {
                content.innerHTML = `
                    <div class="bg-white rounded-[2.5rem] border border-slate-200 p-8 md:p-12 shadow-sm text-center">
                        <div class="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">ℹ️</div>
                        <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight mb-4 text-center">${slot.title}</h2>
                        <div class="max-w-md mx-auto p-6 bg-slate-50 rounded-3xl border border-dashed border-slate-200 text-slate-600 font-bold leading-relaxed italic text-center">
                            "${slot.note}"
                        </div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="flex items-center justify-between px-2">
                        <span class="flex items-center gap-2 text-sm font-black text-slate-800 uppercase tracking-widest">⚔️ Trận đấu: ${slot.title}</span>
                        <div class="h-0.5 bg-red-100 flex-1 mx-4"></div>
                    </div>
                    ${slot.note ? `<div class="px-2 text-[11px] font-bold text-slate-400 italic mb-2 uppercase tracking-tight">${slot.note}</div>` : ''}
                    <div class="grid grid-cols-1 gap-6">
                        ${slot.courts.map(court => renderMatchCard(court)).join('')}
                    </div>
                `;
            }
        }

        function renderMatchCard(court) {
            const mS = scores[court.id] || { a_p1: '', b_p1: '', a_p2: '', b_p2: '' };
            const isFinished = parseInt(mS.a_p2) >= 42 || parseInt(mS.b_p2) >= 42;

            let headerClass = 'bg-red-50 text-red-600';
            if (court.type === 'semi') headerClass = 'bg-blue-600 text-white';
            if (court.type === 'final') headerClass = 'bg-yellow-400 text-yellow-900';
            if (court.type === 'rank') headerClass = 'bg-slate-800 text-white';

            return `
                <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden transition-all hover:shadow-md">
                    <div class="px-6 py-3 text-[10px] font-black uppercase tracking-[0.3em] flex justify-between items-center ${headerClass}">
                        <span>📍 ${court.name}</span>
                        <span>${court.group ? `Bảng ${court.group}` : (court.type === 'semi' ? 'Bán Kết' : (court.type === 'final' ? 'Chung Kết' : 'Tranh Hạng Ba'))}</span>
                    </div>
                    <div class="p-6 md:p-8 space-y-6 text-center">
                        <div class="flex justify-around items-center relative">
                            <div class="w-1/3 text-3xl font-black text-slate-900 mb-1">${court.teamA}</div>
                            <div class="flex flex-col items-center justify-center text-slate-300">
                                <span class="text-xl font-black italic">VS</span>
                            </div>
                            <div class="w-1/3 text-3xl font-black text-slate-900 mb-1">${court.teamB}</div>
                        </div>

                        <div class="bg-slate-50 p-6 rounded-3xl border border-dashed border-slate-200 relative">
                            <div class="absolute -top-3 left-6 px-3 bg-white text-[10px] font-black text-red-600 border border-slate-100 rounded-full uppercase">Lượt 1: Cặp 1 (21đ)</div>
                            <div class="flex items-center justify-between">
                                <div class="text-sm font-black text-slate-400 italic">${court.teamA}.1</div>
                                <div class="flex items-center gap-4">
                                    <input type="text" inputmode="numeric" class="w-16 h-14 bg-white border-2 border-slate-200 rounded-2xl text-center font-black text-2xl focus:border-red-600 outline-none" value="${mS.a_p1}" placeholder="0" oninput="updateScore('${court.id}', 'a_p1', this.value)">
                                    <div class="text-slate-300 font-black text-2xl">:</div>
                                    <input type="text" inputmode="numeric" class="w-16 h-14 bg-white border-2 border-slate-200 rounded-2xl text-center font-black text-2xl focus:border-red-600 outline-none" value="${mS.b_p1}" placeholder="0" oninput="updateScore('${court.id}', 'b_p1', this.value)">
                                </div>
                                <div class="text-sm font-black text-slate-400 italic text-right">${court.teamB}.1</div>
                            </div>
                        </div>

                        <div class="flex justify-center -my-3 relative z-10"><div class="bg-white p-2 rounded-full border border-slate-100 shadow-sm text-red-600">↓</div></div>

                        <div class="bg-red-50/50 p-6 rounded-3xl border-2 border-red-100 relative">
                            <div class="absolute -top-3 left-6 px-3 bg-red-600 text-[10px] font-black text-white rounded-full uppercase">Lượt 2: Cặp 2 (42đ)</div>
                            <div class="flex items-center justify-between">
                                <div class="text-center"><div class="text-sm font-black text-slate-400 italic">${court.teamA}.2</div></div>
                                <div class="flex items-center gap-4">
                                    <input type="text" inputmode="numeric" class="w-16 h-14 bg-white border-2 border-red-200 rounded-2xl text-center font-black text-2xl focus:border-red-600 outline-none text-red-700" value="${mS.a_p2}" placeholder="0" oninput="updateScore('${court.id}', 'a_p2', this.value)">
                                    <div class="text-red-200 font-black text-2xl">:</div>
                                    <input type="text" inputmode="numeric" class="w-16 h-14 bg-white border-2 border-red-200 rounded-2xl text-center font-black text-2xl focus:border-red-600 outline-none text-red-700" value="${mS.b_p2}" placeholder="0" oninput="updateScore('${court.id}', 'b_p2', this.value)">
                                </div>
                                <div class="text-center"><div class="text-sm font-black text-slate-400 italic text-right">${court.teamB}.2</div></div>
                            </div>
                            <div id="finish-${court.id}" class="mt-4 pt-4 border-t border-red-100 text-red-600 font-black uppercase text-[10px] tracking-widest animate-pulse" style="display: ${isFinished ? 'flex' : 'none'}; justify-content: center;">✅ Kết Thúc Trận</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function calculateStandings() {
            const stats = {};
            schedule.forEach(slot => {
                slot.courts.forEach(court => {
                    if (court.id && court.teamA && court.teamB && !court.type) {
                        [court.teamA, court.teamB].forEach(t => { if(!stats[t]) stats[t] = { wins: 0, played: 0, pf: 0, pa: 0 }; });
                        const s = scores[court.id];
                        if (s && (s.a_p2 || s.b_p2)) {
                            const a = parseInt(s.a_p2) || 0;
                            const b = parseInt(s.b_p2) || 0;
                            stats[court.teamA].played++; stats[court.teamB].played++;
                            stats[court.teamA].pf += a; stats[court.teamA].pa += b;
                            stats[court.teamB].pf += b; stats[court.teamB].pa += a;
                            if (a >= 42 || a > b) stats[court.teamA].wins++; else if (b >= 42 || b > a) stats[court.teamB].wins++;
                        }
                    }
                });
            });
            return stats;
        }

        function renderStandings() {
            const container = document.getElementById('standings-tables');
            const stats = calculateStandings();
            container.innerHTML = ['A', 'B'].map(g => `
                <div class="space-y-4">
                    <div class="font-black text-red-600 text-sm uppercase tracking-widest italic">Bảng ${g}</div>
                    <div class="overflow-hidden border border-slate-100 rounded-2xl bg-slate-50/30">
                        <table class="w-full text-sm text-center">
                            <thead class="bg-slate-900 text-white font-bold text-[9px] uppercase">
                                <tr><th class="p-3 text-left">Đội</th><th class="p-3">Trận</th><th class="p-3">Thắng</th><th class="p-3">H.Số</th></tr>
                            </thead>
                            <tbody class="font-bold">
                                ${[1, 2, 3].map(i => {
                                    const t = `${g}${i}`;
                                    const s = stats[t] || { wins: 0, played: 0, pf: 0, pa: 0 };
                                    const diff = s.pf - s.pa;
                                    return `
                                        <tr class="border-t border-slate-100 hover:bg-red-50/30">
                                            <td class="p-3 text-left font-black text-slate-900">${t}</td>
                                            <td class="p-3 text-slate-400 font-medium">${s.played}</td>
                                            <td class="p-3"><div class="bg-red-600 text-white w-6 h-6 flex items-center justify-center rounded-lg mx-auto text-[11px] italic">${s.wins}</div></td>
                                            <td class="p-3 ${diff >= 0 ? 'text-red-600' : 'text-slate-400'}">${diff > 0 ? '+' + diff : diff}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');

            updatePodium();
        }

        function updatePodium() {
            const podiumSection = document.getElementById('final-podium');
            const podiumContent = document.getElementById('podium-content');
            
            // Lấy kết quả trận Chung Kết (f1) và Tranh Hạng Ba (f2)
            const f1 = scores['f1'];
            const f2 = scores['f2'];

            let winners = { gold: null, silver: null, bronze: null };

            if (f1 && (parseInt(f1.a_p2) >= 42 || parseInt(f1.b_p2) >= 42)) {
                if (parseInt(f1.a_p2) > parseInt(f1.b_p2)) {
                    winners.gold = 'Thắng BK1';
                    winners.silver = 'Thắng BK2';
                } else {
                    winners.gold = 'Thắng BK2';
                    winners.silver = 'Thắng BK1';
                }
            }

            if (f2 && (parseInt(f2.a_p2) >= 42 || parseInt(f2.b_p2) >= 42)) {
                winners.bronze = parseInt(f2.a_p2) > parseInt(f2.b_p2) ? 'Thua BK1' : 'Thua BK2';
            }

            if (winners.gold || winners.silver || winners.bronze) {
                podiumSection.classList.remove('hidden');
                podiumContent.innerHTML = `
                    <!-- Vàng -->
                    <div class="bg-gradient-to-br from-yellow-400 to-yellow-600 p-6 rounded-3xl text-white shadow-lg transform hover:scale-105 transition-transform">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-3xl">🥇</span>
                            <span class="text-[10px] font-black uppercase tracking-widest opacity-80">Vô Địch</span>
                        </div>
                        <div class="text-2xl font-black italic uppercase">${winners.gold || '---'}</div>
                        <div class="mt-2 text-[11px] font-bold bg-white/20 py-1 px-3 rounded-full inline-block">Huy Chương Vàng</div>
                    </div>
                    <!-- Bạc -->
                    <div class="bg-gradient-to-br from-slate-300 to-slate-500 p-6 rounded-3xl text-white shadow-lg transform hover:scale-105 transition-transform">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-3xl">🥈</span>
                            <span class="text-[10px] font-black uppercase tracking-widest opacity-80">Giải Nhì</span>
                        </div>
                        <div class="text-2xl font-black italic uppercase">${winners.silver || '---'}</div>
                        <div class="mt-2 text-[11px] font-bold bg-white/20 py-1 px-3 rounded-full inline-block">Huy Chương Bạc</div>
                    </div>
                    <!-- Đồng -->
                    <div class="bg-gradient-to-br from-orange-400 to-orange-700 p-6 rounded-3xl text-white shadow-lg transform hover:scale-105 transition-transform">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-3xl">🥉</span>
                            <span class="text-[10px] font-black uppercase tracking-widest opacity-80">Giải Ba</span>
                        </div>
                        <div class="text-2xl font-black italic uppercase">${winners.bronze || '---'}</div>
                        <div class="mt-2 text-[11px] font-bold bg-white/20 py-1 px-3 rounded-full inline-block">Huy Chương Đồng</div>
                    </div>
                `;
            } else {
                podiumSection.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
