<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel VTT Badminton - Live Score</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .header-gradient {
            background: linear-gradient(135deg, #ee0000 0%, #c20000 50%, #990000 100%);
        }
        .header-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .glass-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .team-label-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
</head>
<body class="text-slate-900 pb-12">

    <!-- HEADER -->
    <header class="header-gradient text-white relative overflow-hidden shadow-2xl">
        <div class="absolute inset-0 header-pattern opacity-40"></div>
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-72 h-72 bg-black/10 rounded-full blur-2xl"></div>
        
        <div class="max-w-4xl mx-auto px-6 py-8 md:py-12 relative z-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div class="space-y-2">
                    <div class="flex items-center gap-3">
                        <div class="glass-badge p-2 rounded-xl">
                            <svg class="w-8 h-8 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M18 2H6c-1.1 0-2 .9-2 2v2c0 2.21 1.79 4 4 4h1v2c0 2.12 1.34 4.07 3.23 4.69l-.73 1.81c-.26.65.22 1.34.92 1.34h3.16c.7 0 1.18-.69.92-1.34l-.73-1.81C17.66 16.07 19 14.12 19 12v-2h1c2.21 0 4-1.79 4-4V4c0-1.1-.9-2-2-2zm-12 4V4h2v4H7c-.55 0-1-.45-1-1zm12 1c0 .55-.45 1-1 1h-1V4h2v2z"/>
                            </svg>
                        </div>
                        <h1 class="text-2xl md:text-4xl font-black italic tracking-tighter uppercase leading-none">
                            Viettel VTT<br/>
                            <span class="text-white/90 font-extrabold not-italic text-lg md:text-2xl tracking-normal">Badminton Tournament</span>
                        </h1>
                    </div>
                </div>
                
                <div class="flex flex-col items-start md:items-end">
                    <div class="glass-badge px-4 py-2 rounded-2xl">
                        <p class="text-[11px] font-black uppercase tracking-[0.2em] text-white/80">Cúp Đồng Đội Tiếp Sức "Mini"</p>
                        <p class="text-sm font-bold text-yellow-300">Live Scoring System</p>
                    </div>
                </div>
            </div>
            <div class="mt-8 h-1 w-full bg-gradient-to-r from-transparent via-white/20 to-transparent rounded-full"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-8 mt-4">
        <!-- NAVIGATION SLOTS -->
        <div id="nav-slots" class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide"></div>

        <!-- CONTENT AREA -->
        <div id="content-area" class="space-y-4"></div>

        <!-- STANDINGS & RESULTS -->
        <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-6 md:p-8">
            <!-- PHẦN THƯỞNG KHI CÓ KẾT QUẢ CHUNG CUỘC -->
            <div id="final-podium" class="mb-10 hidden">
                <div class="flex items-center gap-3 mb-6 border-l-4 border-yellow-500 pl-4">
                    <h3 class="font-black text-slate-900 uppercase tracking-tighter text-xl text-yellow-600">Bảng Vàng Danh Dự</h3>
                </div>
                <div id="podium-content" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div class="flex items-center gap-3 mb-8 border-l-4 border-red-600 pl-4">
                <h3 class="font-black text-slate-900 uppercase tracking-tighter text-xl">Bảng Xếp Hạng Vòng Bảng</h3>
                <div class="bg-red-50 text-red-600 text-[10px] font-black px-2 py-0.5 rounded italic">LIVE</div>
            </div>
            <div id="standings-tables" class="grid grid-cols-1 lg:grid-cols-2 gap-10"></div>
            <div class="mt-10 flex items-start gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <span class="text-red-600 mt-0.5">⚠️</span>
                <div class="text-[10px] font-bold text-slate-500 leading-relaxed">
                    HỆ THỐNG TỰ ĐỘNG: Đội thắng trận Bán kết sẽ được điền thẳng vào trận Chung kết. Đội thua sẽ tranh Hạng 3. BXH cập nhật dựa trên: Thắng > Hiệu số > Điểm ghi được.
                </div>
            </div>
        </div>
    </main>

    <script>
        const schedule = [
            { title: "Khởi động", courts: [], note: "Phổ biến luật Tiếp sức: Cặp 1 đánh đến 21, Cặp 2 nối tiếp đến 42." },
            { title: "Vòng Bảng - Lượt 1", courts: [
                { id: 'r1_m1', name: "Sân 1", group: 'A', teamA: 'A1', teamB: 'A2' },
                { id: 'r1_m2', name: "Sân 2", group: 'B', teamA: 'B1', teamB: 'B2' }
            ]},
            { title: "Vòng Bảng - Lượt 2", courts: [
                { id: 'r2_m1', name: "Sân 1", group: 'A', teamA: 'A1', teamB: 'A3' },
                { id: 'r2_m2', name: "Sân 2", group: 'B', teamA: 'B1', teamB: 'B3' }
            ]},
            { title: "Vòng Bảng - Lượt 3", courts: [
                { id: 'r3_m1', name: "Sân 1", group: 'A', teamA: 'A2', teamB: 'A3' },
                { id: 'r3_m2', name: "Sân 2", group: 'B', teamA: 'B2', teamB: 'B3' }
            ]},
            { title: "Vòng Bán Kết", note: "Đấu chéo: Nhất A vs Nhì B, Nhất B vs Nhì A.", courts: [
                { id: 'sf1', name: "Sân 1", type: "semi", teamA: 'Nhất A', teamB: 'Nhì B' },
                { id: 'sf2', name: "Sân 2", type: "semi", teamA: 'Nhất B', teamB: 'Nhì A' }
            ]},
            { title: "Chung Kết", note: "Xác định Vô địch, Nhì và Ba.", courts: [
                { id: 'f1', name: "Sân 1", type: "final", teamA: 'Thắng BK1', teamB: 'Thắng BK2' },
                { id: 'f2', name: "Sân 2", type: "rank", teamA: 'Thua BK1', teamB: 'Thua BK2' }
            ]}
        ];

        let currentSlotIndex = 0;
        let scores = {};

        function init() {
            renderNav();
            renderContent();
            renderStandings();
        }

        function renderNav() {
            const nav = document.getElementById('nav-slots');
            nav.innerHTML = schedule.map((slot, idx) => `
                <button onclick="changeSlot(${idx})" class="flex-shrink-0 px-6 py-4 rounded-2xl border-2 transition-all font-bold text-sm min-w-[160px] ${currentSlotIndex === idx ? 'bg-red-600 border-red-600 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400 hover:border-red-100'}">
                    <div class="truncate uppercase tracking-tight">${slot.title}</div>
                </button>
            `).join('');
        }

        function changeSlot(idx) {
            currentSlotIndex = idx;
            renderNav();
            renderContent();
        }

        // Cập nhật tỉ số và kích hoạt tính toán lại toàn bộ
        function updateScore(matchId, field, value) {
            if (value !== '' && !/^\d+$/.test(value)) return;
            if (value.length > 2) value = value.slice(-2);

            if (!scores[matchId]) scores[matchId] = { a_p1: '', b_p1: '', a_p2: '', b_p2: '' };
            scores[matchId][field] = value;
            
            // Re-calculate and update UI
            renderStandings(); 
            renderContent(); 
        }

        // Logic xếp hạng vòng bảng
        function getGroupRankings(group) {
            const stats = calculateStandings();
            const teams = [1, 2, 3].map(i => `${group}${i}`).filter(t => stats[t]);
            
            teams.sort((a, b) => {
                const sA = stats[a];
                const sB = stats[b];
                // 1. Số trận thắng
                if (sB.wins !== sA.wins) return sB.wins - sA.wins;
                // 2. Hiệu số điểm
                const diffA = sA.pf - sA.pa;
                const diffB = sB.pf - sB.pa;
                if (diffB !== diffA) return diffB - diffA;
                // 3. Tổng điểm ghi được
                return sB.pf - sA.pf;
            });
            return teams;
        }

        // Tìm đội thắng của một trận cụ thể
        function getMatchWinner(matchId, defaultLabel) {
            const s = scores[matchId];
            if (!s || (parseInt(s.a_p2) < 42 && parseInt(s.b_p2) < 42)) return defaultLabel;
            
            // Tìm định nghĩa trận đấu để biết teamA/teamB gốc là gì (để resolve đệ quy nếu cần)
            const matchDef = schedule.flatMap(s => s.courts).find(c => c.id === matchId);
            const teamAName = resolveTeamName(matchDef.teamA, matchId);
            const teamBName = resolveTeamName(matchDef.teamB, matchId);

            return parseInt(s.a_p2) > parseInt(s.b_p2) ? teamAName : teamBName;
        }

        // Tìm đội thua của một trận cụ thể
        function getMatchLoser(matchId, defaultLabel) {
            const s = scores[matchId];
            if (!s || (parseInt(s.a_p2) < 42 && parseInt(s.b_p2) < 42)) return defaultLabel;
            
            const matchDef = schedule.flatMap(s => s.courts).find(c => c.id === matchId);
            const teamAName = resolveTeamName(matchDef.teamA, matchId);
            const teamBName = resolveTeamName(matchDef.teamB, matchId);

            return parseInt(s.a_p2) > parseInt(s.b_p2) ? teamBName : teamAName;
        }

        // Hàm quan trọng nhất: Chuyển đổi từ "Nhất A", "Thắng BK1" sang tên Đội thật
        function resolveTeamName(placeholder) {
            if (placeholder === 'Nhất A') return getGroupRankings('A')[0] || 'Nhất A';
            if (placeholder === 'Nhì A') return getGroupRankings('A')[1] || 'Nhì A';
            if (placeholder === 'Nhất B') return getGroupRankings('B')[0] || 'Nhất B';
            if (placeholder === 'Nhì B') return getGroupRankings('B')[1] || 'Nhì B';
            
            if (placeholder === 'Thắng BK1') return getMatchWinner('sf1', 'Thắng BK1');
            if (placeholder === 'Thắng BK2') return getMatchWinner('sf2', 'Thắng BK2');
            if (placeholder === 'Thua BK1') return getMatchLoser('sf1', 'Thua BK1');
            if (placeholder === 'Thua BK2') return getMatchLoser('sf2', 'Thua BK2');
            
            return placeholder;
        }

        function renderContent() {
            const content = document.getElementById('content-area');
            const slot = schedule[currentSlotIndex];

            if (slot.courts.length === 0) {
                content.innerHTML = `
                    <div class="bg-white rounded-[2.5rem] border border-slate-200 p-8 md:p-12 shadow-sm text-center">
                        <div class="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl text-red-600">i</div>
                        <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight mb-4">${slot.title}</h2>
                        <p class="text-slate-500 font-bold italic">${slot.note}</p>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="flex items-center justify-between px-2">
                        <span class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-2 h-2 bg-red-600 rounded-full animate-ping"></span>
                            Đang diễn ra: ${slot.title}
                        </span>
                    </div>
                    ${slot.note ? `<div class="px-2 text-[11px] font-bold text-slate-400 italic mb-2 uppercase tracking-tight">${slot.note}</div>` : ''}
                    <div class="grid grid-cols-1 gap-6">
                        ${slot.courts.map(court => renderMatchCard(court)).join('')}
                    </div>
                `;
            }
        }

        function renderMatchCard(court) {
            const mS = scores[court.id] || { a_p1: '', b_p1: '', a_p2: '', b_p2: '' };
            const isFinished = parseInt(mS.a_p2) >= 42 || parseInt(mS.b_p2) >= 42;

            // TỰ ĐỘNG LẤY TÊN ĐỘI
            const teamA = resolveTeamName(court.teamA);
            const teamB = resolveTeamName(court.teamB);

            let colorSet = { header: 'bg-slate-100 text-slate-600', input: 'border-slate-200 focus:border-red-600' };
            if (court.type === 'semi') colorSet = { header: 'bg-blue-600 text-white', input: 'border-blue-200 focus:border-blue-600' };
            if (court.type === 'final') colorSet = { header: 'bg-yellow-400 text-yellow-900', input: 'border-yellow-300 focus:border-yellow-500' };
            if (court.type === 'rank') colorSet = { header: 'bg-slate-800 text-white', input: 'border-slate-300 focus:border-slate-600' };

            return `
                <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                    <div class="px-6 py-3 text-[10px] font-black uppercase tracking-[0.3em] flex justify-between items-center ${colorSet.header}">
                        <span>📍 ${court.name}</span>
                        <span>${court.group ? `BẢNG ${court.group}` : (court.type === 'semi' ? 'BÁN KẾT' : (court.type === 'final' ? 'CHUNG KẾT' : 'TRANH HẠNG BA'))}</span>
                    </div>
                    <div class="p-6 md:p-8 space-y-6">
                        <div class="flex justify-between items-center">
                            <div class="w-2/5 text-center">
                                <div class="text-3xl font-black text-slate-900 truncate uppercase italic">${teamA}</div>
                            </div>
                            <div class="text-xl font-black italic text-slate-300">VS</div>
                            <div class="w-2/5 text-center">
                                <div class="text-3xl font-black text-slate-900 truncate uppercase italic">${teamB}</div>
                            </div>
                        </div>

                        <!-- INPUT SCORE -->
                        <div class="grid grid-cols-1 gap-4">
                            <!-- Cặp 1 -->
                            <div class="bg-slate-50 p-4 rounded-3xl border border-dashed border-slate-200 flex items-center justify-between">
                                <span class="text-[10px] font-black text-slate-400 uppercase w-12 text-left">Set 1</span>
                                <div class="flex items-center gap-4">
                                    <input type="text" inputmode="numeric" class="w-14 h-12 bg-white border-2 ${colorSet.input} rounded-2xl text-center font-black text-xl outline-none" value="${mS.a_p1}" placeholder="0" oninput="updateScore('${court.id}', 'a_p1', this.value)">
                                    <span class="text-slate-300 font-bold">:</span>
                                    <input type="text" inputmode="numeric" class="w-14 h-12 bg-white border-2 ${colorSet.input} rounded-2xl text-center font-black text-xl outline-none" value="${mS.b_p1}" placeholder="0" oninput="updateScore('${court.id}', 'b_p1', this.value)">
                                </div>
                                <span class="text-[10px] font-black text-slate-400 uppercase w-12 text-right">Max 21</span>
                            </div>
                            <!-- Cặp 2 -->
                            <div class="bg-white p-5 rounded-3xl border-2 border-red-100 shadow-inner flex items-center justify-between">
                                <span class="text-[10px] font-black text-red-600 uppercase w-12 text-left">Set 2</span>
                                <div class="flex items-center gap-4">
                                    <input type="text" inputmode="numeric" class="w-16 h-14 bg-red-50/50 border-2 border-red-500 rounded-2xl text-center font-black text-2xl outline-none text-red-600" value="${mS.a_p2}" placeholder="0" oninput="updateScore('${court.id}', 'a_p2', this.value)">
                                    <span class="text-red-200 font-black text-2xl">:</span>
                                    <input type="text" inputmode="numeric" class="w-16 h-14 bg-red-50/50 border-2 border-red-500 rounded-2xl text-center font-black text-2xl outline-none text-red-600" value="${mS.b_p2}" placeholder="0" oninput="updateScore('${court.id}', 'b_p2', this.value)">
                                </div>
                                <span class="text-[10px] font-black text-red-600 uppercase w-12 text-right">Max 42</span>
                            </div>
                        </div>

                        ${isFinished ? `
                            <div class="text-center py-2 bg-slate-900 text-white rounded-2xl text-[10px] font-black tracking-widest uppercase">
                                🏆 Trận đấu đã kết thúc
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function calculateStandings() {
            const stats = {};
            // Chỉ tính cho các trận vòng bảng (không có type)
            schedule.forEach(slot => {
                slot.courts.forEach(court => {
                    if (court.id && court.teamA && court.teamB && !court.type) {
                        [court.teamA, court.teamB].forEach(t => { if(!stats[t]) stats[t] = { wins: 0, played: 0, pf: 0, pa: 0 }; });
                        const s = scores[court.id];
                        if (s && (s.a_p2 !== '' || s.b_p2 !== '')) {
                            const a = parseInt(s.a_p2) || 0;
                            const b = parseInt(s.b_p2) || 0;
                            stats[court.teamA].played++; stats[court.teamB].played++;
                            stats[court.teamA].pf += a; stats[court.teamA].pa += b;
                            stats[court.teamB].pf += b; stats[court.teamB].pa += a;
                            
                            // Một trận kết thúc ở 42 hoặc ai cao hơn khi dừng
                            if (a > b) stats[court.teamA].wins++;
                            else if (b > a) stats[court.teamB].wins++;
                        }
                    }
                });
            });
            return stats;
        }

        function renderStandings() {
            const container = document.getElementById('standings-tables');
            const stats = calculateStandings();
            container.innerHTML = ['A', 'B'].map(g => {
                const rankings = getGroupRankings(g);
                return `
                    <div class="space-y-4">
                        <div class="font-black text-red-600 text-sm uppercase tracking-widest italic flex items-center gap-2">
                            <span>Bảng ${g}</span>
                            <div class="h-[1px] flex-1 bg-red-100"></div>
                        </div>
                        <div class="overflow-hidden border border-slate-100 rounded-3xl bg-slate-50/30">
                            <table class="w-full text-sm text-center">
                                <thead class="bg-slate-900 text-white font-bold text-[9px] uppercase">
                                    <tr><th class="p-4 text-left">Đội</th><th class="p-4">Trận</th><th class="p-4">Thắng</th><th class="p-4">H.Số</th></tr>
                                </thead>
                                <tbody class="font-bold">
                                    ${rankings.map((t, idx) => {
                                        const s = stats[t] || { wins: 0, played: 0, pf: 0, pa: 0 };
                                        const diff = s.pf - s.pa;
                                        const isTop2 = idx < 2;
                                        return `
                                            <tr class="border-t border-slate-100 bg-white">
                                                <td class="p-4 text-left flex items-center gap-2">
                                                    <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${isTop2 ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}">${idx+1}</span>
                                                    <span class="font-black text-slate-900">${t}</span>
                                                </td>
                                                <td class="p-4 text-slate-400">${s.played}</td>
                                                <td class="p-4"><span class="bg-red-600 text-white px-2 py-1 rounded-lg text-[11px]">${s.wins}</span></td>
                                                <td class="p-4 ${diff >= 0 ? 'text-red-600' : 'text-slate-400'}">${diff > 0 ? '+' + diff : diff}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join('');

            updatePodium();
        }

        function updatePodium() {
            const podiumSection = document.getElementById('final-podium');
            const podiumContent = document.getElementById('podium-content');
            
            // Lấy kết quả f1 (Chung kết) và f2 (Tranh hạng 3)
            const f1 = scores['f1'];
            const f2 = scores['f2'];

            let winners = { gold: null, silver: null, bronze: null };

            // Resolve đội đoạt giải
            if (f1 && (parseInt(f1.a_p2) >= 42 || parseInt(f1.b_p2) >= 42)) {
                if (parseInt(f1.a_p2) > parseInt(f1.b_p2)) {
                    winners.gold = resolveTeamName('Thắng BK1');
                    winners.silver = resolveTeamName('Thắng BK2');
                } else {
                    winners.gold = resolveTeamName('Thắng BK2');
                    winners.silver = resolveTeamName('Thắng BK1');
                }
            }

            if (f2 && (parseInt(f2.a_p2) >= 42 || parseInt(f2.b_p2) >= 42)) {
                winners.bronze = parseInt(f2.a_p2) > parseInt(f2.b_p2) ? resolveTeamName('Thua BK1') : resolveTeamName('Thua BK2');
            }

            if (winners.gold || winners.silver || winners.bronze) {
                podiumSection.classList.remove('hidden');
                podiumContent.innerHTML = `
                    <!-- Vàng -->
                    <div class="bg-gradient-to-br from-yellow-400 to-yellow-600 p-6 rounded-[2rem] text-white shadow-xl border-4 border-yellow-200">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-4xl">🥇</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">Vô Địch</span>
                        </div>
                        <div class="text-2xl font-black italic uppercase truncate">${winners.gold || '---'}</div>
                        <div class="mt-4 text-[10px] font-bold bg-black/20 py-1 px-3 rounded-full inline-block uppercase italic">Huy Chương Vàng</div>
                    </div>
                    <!-- Bạc -->
                    <div class="bg-gradient-to-br from-slate-300 to-slate-500 p-6 rounded-[2rem] text-white shadow-xl border-4 border-slate-100">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-4xl">🥈</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">Giải Nhì</span>
                        </div>
                        <div class="text-2xl font-black italic uppercase truncate">${winners.silver || '---'}</div>
                        <div class="mt-4 text-[10px] font-bold bg-black/20 py-1 px-3 rounded-full inline-block uppercase italic">Huy Chương Bạc</div>
                    </div>
                    <!-- Đồng -->
                    <div class="bg-gradient-to-br from-orange-500 to-orange-800 p-6 rounded-[2rem] text-white shadow-xl border-4 border-orange-200">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-4xl">🥉</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">Giải Ba</span>
                        </div>
                        <div class="text-2xl font-black italic uppercase truncate">${winners.bronze || '---'}</div>
                        <div class="mt-4 text-[10px] font-bold bg-black/20 py-1 px-3 rounded-full inline-block uppercase italic">Huy Chương Đồng</div>
                    </div>
                `;
                // Scroll to podium if just appeared
                if(podiumSection.dataset.shown !== 'true') {
                    podiumSection.scrollIntoView({ behavior: 'smooth' });
                    podiumSection.dataset.shown = 'true';
                }
            } else {
                podiumSection.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
