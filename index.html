<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel VTT Badminton - Automated Live Score</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .header-gradient {
            background: linear-gradient(135deg, #ee0000 0%, #c20000 50%, #990000 100%);
        }
        .header-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .glass-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .win-glow {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
            border-color: #22c55e !important;
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #fef2f2;
            color: #dc2626;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
        }
        .dot {
            height: 6px;
            width: 6px;
            background-color: #dc2626;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(220, 38, 38, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .podium-card {
            background: linear-gradient(to bottom, #ffffff, #fdfbfb);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="text-slate-900 pb-12">

    <header class="header-gradient text-white relative overflow-hidden shadow-2xl">
        <div class="absolute inset-0 header-pattern opacity-40"></div>
        <div class="max-w-4xl mx-auto px-6 py-8 md:py-12 relative z-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div class="space-y-2">
                    <div class="flex items-center gap-3">
                        <div class="glass-badge p-2 rounded-xl">
                            <svg class="w-8 h-8 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M18 2H6c-1.1 0-2 .9-2 2v2c0 2.21 1.79 4 4 4h1v2c0 2.12 1.34 4.07 3.23 4.69l-.73 1.81c-.26.65.22 1.34.92 1.34h3.16c.7 0 1.18-.69.92-1.34l-.73-1.81C17.66 16.07 19 14.12 19 12v-2h1c2.21 0 4-1.79 4-4V4c0-1.1-.9-2-2-2zm-12 4V4h2v4H7c-.55 0-1-.45-1-1zm12 1c0 .55-.45 1-1 1h-1V4h2v2z"/>
                            </svg>
                        </div>
                        <h1 class="text-2xl md:text-4xl font-black italic tracking-tighter uppercase leading-none">
                            Viettel VTT<br/>
                            <span class="text-white/90 font-extrabold not-italic text-lg md:text-2xl tracking-normal">Badminton System</span>
                        </h1>
                    </div>
                </div>
                <div class="glass-badge px-4 py-2 rounded-2xl text-right">
                    <p class="text-[11px] font-black uppercase tracking-[0.2em] text-white/80">Giải Đồng Đội Tiếp Sức</p>
                    <p class="text-sm font-bold text-yellow-300">Live Scoring System</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6 mt-4">
        <div id="nav-slots" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"></div>
        <div id="content-area" class="space-y-6"></div>
        <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-6">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-1.5 h-6 bg-red-600 rounded-full"></div>
                    <h3 class="font-black text-slate-900 uppercase tracking-tighter text-xl">Xếp Hạng Vòng Bảng</h3>
                </div>
                <div class="live-indicator uppercase tracking-widest">
                    <span class="dot"></span> Trực tuyến
                </div>
            </div>
            <div id="standings-tables" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </main>

    <script>
        const schedule = [
            { id: 'warmup', title: "Khởi động", note: "Các đội tự do khởi động trên 3 sân. Phổ biến luật thi đấu tiếp sức (21-42)." },
            { id: 'group1', title: "Vòng Bảng - Lượt 1", courts: [
                { id: 'g1_1', name: 'Sân 1', group: 'A', teamA: 'A1', teamB: 'A2' },
                { id: 'g1_2', name: 'Sân 2', group: 'B', teamA: 'B1', teamB: 'B2' }
            ]},
            { id: 'group2', title: "Vòng Bảng - Lượt 2", courts: [
                { id: 'g2_1', name: 'Sân 1', group: 'A', teamA: 'A1', teamB: 'A3' },
                { id: 'g2_2', name: 'Sân 2', group: 'B', teamA: 'B1', teamB: 'B3' }
            ]},
            { id: 'group3', title: "Vòng Bảng - Lượt 3", courts: [
                { id: 'g3_1', name: 'Sân 1', group: 'A', teamA: 'A2', teamB: 'A3' },
                { id: 'g3_2', name: 'Sân 2', group: 'B', teamA: 'B2', teamB: 'B3' }
            ]},
            { id: 'semi', title: "Bán Kết", courts: [
                { id: 'sf1', name: 'Sân 1', type: 'auto', role: 'SF1', teamA: 'Nhất A', teamB: 'Nhì B' },
                { id: 'sf2', name: 'Sân 2', type: 'auto', role: 'SF2', teamA: 'Nhất B', teamB: 'Nhì A' }
            ]},
            { id: 'final', title: "Chung Kết & Tranh Hạng", courts: [
                { id: 'f_main', name: 'Sân 1', type: 'auto', role: 'FINAL', teamA: 'Thắng BK1', teamB: 'Thắng BK2' },
                { id: 'f_rank3', name: 'Sân 2', type: 'auto', role: 'RANK3', teamA: 'Thua BK1', teamB: 'Thua BK2' }
            ]}
        ];

        let scores = JSON.parse(localStorage.getItem('vtt_scores')) || {};
        let currentSlotIdx = 1;

        function save() {
            localStorage.setItem('vtt_scores', JSON.stringify(scores));
        }

        function init() {
            renderNav();
            renderContent();
            renderStandings();
        }

        function renderNav() {
            const nav = document.getElementById('nav-slots');
            nav.innerHTML = schedule.map((s, idx) => `
                <button onclick="changeTab(${idx})" class="flex-shrink-0 px-5 py-3 rounded-2xl border-2 transition-all font-bold text-[13px] ${currentSlotIdx === idx ? 'bg-red-600 border-red-600 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-400'}">
                    ${s.title.toUpperCase()}
                </button>
            `).join('');
        }

        function changeTab(idx) {
            currentSlotIdx = idx;
            renderNav();
            renderContent();
        }

        function getRankings(group) {
            const teams = [`${group}1`, `${group}2`, `${group}3`].map(id => ({
                id, wins: 0, pf: 0, pa: 0, played: 0
            }));

            schedule.forEach(slot => {
                if (slot.id.startsWith('group')) {
                    slot.courts.forEach(c => {
                        const s = scores[c.id];
                        if (s && (s.a2 || s.b2)) {
                            const a = parseInt(s.a2) || 0;
                            const b = parseInt(s.b2) || 0;
                            const tA = teams.find(t => t.id === c.teamA);
                            const tB = teams.find(t => t.id === c.teamB);
                            
                            if (tA && tB) {
                                tA.played++; tB.played++;
                                tA.pf += a; tA.pa += b;
                                tB.pf += b; tB.pa += a;
                                if (a > b) tA.wins++; else if (b > a) tB.wins++;
                            }
                        }
                    });
                }
            });

            return teams.sort((a, b) => {
                if (b.wins !== a.wins) return b.wins - a.wins;
                return (b.pf - b.pa) - (a.pf - a.pa);
            });
        }

        function getMatchResult(matchId) {
            const s = scores[matchId];
            if (!s) return null;
            const a = parseInt(s.a2) || 0;
            const b = parseInt(s.b2) || 0;
            if (a === 0 && b === 0) return null;
            
            return {
                winner: a > b ? (s.actualA || "Đội A") : (s.actualB || "Đội B"),
                loser: a > b ? (s.actualB || "Đội B") : (s.actualA || "Đội A"),
                finished: a >= 42 || b >= 42
            };
        }

        function updateScore(matchId, field, val, actualA, actualB) {
            if (!scores[matchId]) scores[matchId] = {};
            scores[matchId][field] = val;
            scores[matchId].actualA = String(actualA || "");
            scores[matchId].actualB = String(actualB || "");
            save();
            renderStandings();
            
            // Chỉ render lại content nếu trận đấu kết thúc hoặc bắt đầu có kết quả vòng BK
            const numVal = parseInt(val) || 0;
            if (numVal >= 42 || (currentSlotIdx >= 4 && (field === 'a2' || field === 'b2'))) {
                renderContent();
            }
        }

        function renderMatchCard(court) {
            let teamA = court.teamA;
            let teamB = court.teamB;
            let subTitle = court.group || 'Vòng tiếp theo';

            if (court.role === 'SF1') {
                const rankA = getRankings('A'); const rankB = getRankings('B');
                teamA = rankA[0].id; teamB = rankB[1].id;
            } else if (court.role === 'SF2') {
                const rankA = getRankings('A'); const rankB = getRankings('B');
                teamA = rankB[0].id; teamB = rankA[1].id;
            }
            
            if (court.role === 'FINAL') {
                const res1 = getMatchResult('sf1'); const res2 = getMatchResult('sf2');
                teamA = res1 ? res1.winner : 'Thắng BK1';
                teamB = res2 ? res2.winner : 'Thắng BK2';
                subTitle = 'Chung kết';
            } else if (court.role === 'RANK3') {
                const res1 = getMatchResult('sf1'); const res2 = getMatchResult('sf2');
                teamA = res1 ? res1.loser : 'Thua BK1';
                teamB = res2 ? res2.loser : 'Thua BK2';
                subTitle = 'Tranh hạng 3';
            }

            // Fallback để không bao giờ bị undefined khi hiển thị
            teamA = teamA || "Đang chờ...";
            teamB = teamB || "Đang chờ...";

            const s = scores[court.id] || { a1: '', b1: '', a2: '', b2: '' };
            const isFinished = (parseInt(s.a2) >= 42 || parseInt(s.b2) >= 42);

            const safeA = String(teamA).replace(/'/g, "\\'");
            const safeB = String(teamB).replace(/'/g, "\\'");

            return `
                <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden card-shadow transition-all ${isFinished ? 'win-glow' : ''}">
                    <div class="px-5 py-2 bg-slate-50 border-b flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${court.name} - ${subTitle}</span>
                        ${isFinished ? '<span class="text-[10px] font-bold text-green-600">TRẬN ĐÃ XONG</span>' : ''}
                    </div>
                    <div class="p-6 space-y-6">
                        <div class="flex justify-between items-center text-center">
                            <div class="w-1/3 font-black text-xl text-red-600">${teamA}</div>
                            <div class="text-[10px] font-black text-slate-300 italic">VS</div>
                            <div class="w-1/3 font-black text-xl text-red-600">${teamB}</div>
                        </div>

                        <!-- LƯỢT 1 -->
                        <div class="bg-slate-50 p-4 rounded-2xl border border-dashed relative">
                            <div class="absolute -top-2 left-4 px-2 bg-white text-[9px] font-black text-slate-400 uppercase">Cặp 1 (${teamA}1 vs ${teamB}1)</div>
                            <div class="flex items-center justify-between">
                                <span class="text-[11px] font-bold text-slate-400">T: 21</span>
                                <div class="flex gap-3">
                                    <input onchange="updateScore('${court.id}','a1',this.value,'${safeA}','${safeB}')" value="${s.a1 || ''}" type="text" inputmode="numeric" placeholder="0" class="w-12 h-10 rounded-xl border-2 text-center font-black text-lg focus:border-red-600 outline-none">
                                    <input onchange="updateScore('${court.id}','b1',this.value,'${safeA}','${safeB}')" value="${s.b1 || ''}" type="text" inputmode="numeric" placeholder="0" class="w-12 h-10 rounded-xl border-2 text-center font-black text-lg focus:border-red-600 outline-none">
                                </div>
                                <span class="text-[11px] font-bold text-slate-400 text-right">T: 21</span>
                            </div>
                        </div>

                        <!-- LƯỢT 2 -->
                        <div class="bg-red-50/30 p-4 rounded-2xl border-2 border-red-100 relative">
                            <div class="absolute -top-2 left-4 px-2 bg-red-600 text-[9px] font-black text-white rounded-full uppercase">Cặp 2 (${teamA}2 vs ${teamB}2)</div>
                            <div class="flex items-center justify-between">
                                <span class="text-[11px] font-bold text-red-600">T: 42</span>
                                <div class="flex gap-3">
                                    <input onchange="updateScore('${court.id}','a2',this.value,'${safeA}','${safeB}')" value="${s.a2 || ''}" type="text" inputmode="numeric" placeholder="0" class="w-12 h-10 rounded-xl border-2 border-red-200 text-center font-black text-lg focus:border-red-600 outline-none text-red-700">
                                    <input onchange="updateScore('${court.id}','b2',this.value,'${safeA}','${safeB}')" value="${s.b2 || ''}" type="text" inputmode="numeric" placeholder="0" class="w-12 h-10 rounded-xl border-2 border-red-200 text-center font-black text-lg focus:border-red-600 outline-none text-red-700">
                                </div>
                                <span class="text-[11px] font-bold text-red-600 text-right">T: 42</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPodium() {
            const resFinal = getMatchResult('f_main');
            const resRank3 = getMatchResult('f_rank3');
            
            if (!resFinal && !resRank3) return '';

            const gold = resFinal ? resFinal.winner : '...';
            const silver = resFinal ? resFinal.loser : '...';
            const bronze = resRank3 ? resRank3.winner : '...';

            return `
                <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-8 space-y-8 animate-in fade-in zoom-in duration-500">
                    <div class="text-center space-y-2">
                        <h3 class="font-black text-2xl uppercase tracking-tighter text-slate-900">Bảng Vàng Danh Dự</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Viettel VTT Badminton Tournament</p>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="order-2 md:order-1 podium-card border-2 border-slate-100 rounded-3xl p-6 text-center space-y-3">
                            <div class="w-16 h-16 mx-auto bg-slate-100 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🥈</div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Hạng Nhì</p>
                                <p class="text-2xl font-black text-slate-600">${silver}</p>
                                <p class="text-[11px] font-bold text-slate-400 italic">Huy chương Bạc</p>
                            </div>
                        </div>

                        <div class="order-1 md:order-2 podium-card border-4 border-yellow-400 rounded-[2.5rem] p-8 text-center space-y-4 shadow-xl -mt-4 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1 bg-yellow-400"></div>
                            <div class="w-20 h-20 mx-auto bg-yellow-50 rounded-3xl flex items-center justify-center text-4xl shadow-sm border-2 border-yellow-100">🥇</div>
                            <div class="space-y-1">
                                <p class="text-xs font-black text-yellow-600 uppercase tracking-[0.2em]">Hạng Nhất</p>
                                <p class="text-4xl font-black text-slate-900 tracking-tighter">${gold}</p>
                                <p class="text-sm font-bold text-yellow-600 italic">Huy chương Vàng</p>
                            </div>
                        </div>

                        <div class="order-3 podium-card border-2 border-orange-50 rounded-3xl p-6 text-center space-y-3">
                            <div class="w-16 h-16 mx-auto bg-orange-50 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🥉</div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Hạng Ba</p>
                                <p class="text-2xl font-black text-orange-700">${bronze}</p>
                                <p class="text-[11px] font-bold text-orange-400 italic">Huy chương Đồng</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContent() {
            const area = document.getElementById('content-area');
            const slot = schedule[currentSlotIdx];
            
            if (slot.id === 'warmup') {
                area.innerHTML = `
                    <div class="bg-white p-12 rounded-[2.5rem] border border-slate-200 text-center space-y-4">
                        <div class="text-4xl">🏸</div>
                        <p class="font-bold text-slate-400 italic leading-relaxed">${slot.note}</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${slot.courts.map(c => renderMatchCard(c)).join('')}
                </div>
            `;

            if (slot.id === 'final') {
                html = renderPodium() + html;
            }

            area.innerHTML = html;
        }

        function renderStandings() {
            const container = document.getElementById('standings-tables');
            container.innerHTML = ['A', 'B'].map(group => {
                const teams = getRankings(group);
                return `
                    <div class="space-y-4">
                        <div class="flex items-center gap-2">
                            <span class="bg-slate-900 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase">Bảng ${group}</span>
                        </div>
                        <div class="overflow-hidden rounded-2xl border border-slate-100 shadow-sm">
                            <table class="w-full text-sm">
                                <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                                    <tr>
                                        <th class="p-3 text-left">Team</th>
                                        <th class="p-3 text-center">Wins</th>
                                        <th class="p-3 text-right">+/- Diff</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-slate-50">
                                    ${teams.map((t, idx) => `
                                        <tr class="${idx < 2 ? 'bg-green-50/30' : ''} transition-colors">
                                            <td class="p-3">
                                                <div class="flex items-center gap-2">
                                                    <span class="w-6 h-6 flex items-center justify-center rounded-full text-[10px] font-bold ${idx === 0 ? 'bg-yellow-400 text-white' : (idx === 1 ? 'bg-slate-300 text-slate-600' : 'bg-slate-100 text-slate-400')}">
                                                        ${idx + 1}
                                                    </span>
                                                    <span class="font-black text-slate-700">${t.id}</span>
                                                </div>
                                            </td>
                                            <td class="p-3 text-center">
                                                <span class="inline-block px-2 py-1 bg-red-50 text-red-600 rounded-lg font-black">${t.wins}</span>
                                            </td>
                                            <td class="p-3 text-right">
                                                <span class="font-bold ${t.pf - t.pa >= 0 ? 'text-green-600' : 'text-slate-400'}">
                                                    ${t.pf - t.pa > 0 ? '+' : ''}${t.pf - t.pa}
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
